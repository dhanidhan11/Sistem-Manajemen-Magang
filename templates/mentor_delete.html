{% extends 'base.html' %}

{% block title %}Hapus Mentor{% endblock %}

{% block content %}
<div class="container mt-2" style="max-width: 500px;">
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-body p-4 text-center">
            <i class="fas fa-exclamation-triangle fa-4x text-danger mb-3"></i>
            <h4 class="fw-bold mb-2">Konfirmasi Hapus Mentor</h4>
            <p class="text-muted">Apakah Anda yakin ingin menghapus mentor <strong>{{ mentor.get_full_name|default:mentor.username }}</strong>?</p>
            <p class="text-danger small"><i class="fas fa-info-circle me-1"></i> Tindakan ini tidak dapat dibatalkan.</p>
            
            <hr class="my-4">
            
            <form method="POST">
                {% csrf_token %}
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'users:mentor_list' %}" class="btn btn-light rounded-pill px-4">Batal</a>
                    <button type="submit" class="btn btn-danger rounded-pill px-4 fw-bold">
                        Hapus Permanen
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
