{% extends 'base.html' %}

{% block title %}Edit Data Mentor{% endblock %}

{% block content %}
<div class="container mt-2" style="max-width: 600px;">
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-header bg-gradient-primary text-white p-4" style="border-radius: 16px 16px 0 0; background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);">
            <h4 class="mb-0 fw-bold"><i class="fas fa-edit me-2"></i> Edit Data Mentor</h4>
            <p class="mb-0 text-white-50 small mt-1">Ubah informasi untuk mentor <strong>{{ mentor.username }}</strong>.</p>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label fw-semibold text-dark">Username</label>
                        <input type="text" class="form-control bg-light" value="{{ mentor.username }}" readonly>
                        <small class="text-muted">Username tidak dapat diubah.</small>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="nama_depan" class="form-label fw-semibold text-dark">Nama Depan</label>
                        <input type="text" class="form-control" id="nama_depan" name="nama_depan" value="{{ mentor.first_name }}" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="nama_belakang" class="form-label fw-semibold text-dark">Nama Belakang</label>
                        <input type="text" class="form-control" id="nama_belakang" name="nama_belakang" value="{{ mentor.last_name }}">
                    </div>
                    
                    <div class="col-12">
                        <label for="email" class="form-label fw-semibold text-dark">Email</label>
                        <input type="email" class="form-control" id="email" name="email" value="{{ mentor.email }}" required>
                    </div>

                    <div class="col-12">
                        <label for="bidang" class="form-label fw-semibold text-dark">Bidang Penempatan</label>
                        <select name="bidang" id="bidang" class="form-select" required>
                            <option value="" disabled>-- Pilih Bidang Penempatan --</option>
                            {% for val, label in bidang_choices %}
                                <option value="{{ val }}" {% if mentor.mentor_profile.bidang == val %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Mentor bertanggung jawab pada bidang ini.</small>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'users:mentor_list' %}" class="btn btn-light rounded-pill px-4">Batal</a>
                    <button type="submit" class="btn btn-warning text-dark rounded-pill px-4 fw-bold">
                        <i class="fas fa-save me-2"></i> Update Mentor
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
