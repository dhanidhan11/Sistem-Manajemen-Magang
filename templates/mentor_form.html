{% extends 'base.html' %}

{% block title %}Tambah Mentor Baru{% endblock %}

{% block content %}
<div class="container mt-2" style="max-width: 600px;">
    <div class="card border-0 shadow-sm" style="border-radius: 16px;">
        <div class="card-header bg-gradient-primary text-white p-4" style="border-radius: 16px 16px 0 0; background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);">
            <h4 class="mb-0 fw-bold"><i class="fas fa-user-tie me-2"></i> Tambah Mentor Baru</h4>
            <p class="mb-0 text-white-50 small mt-1">Buat akun login untuk mentor magang baru.</p>
        </div>
        <div class="card-body p-4">
            <form method="POST">
                {% csrf_token %}
                
                <div class="row g-3">
                    <div class="col-12">
                        <label for="username" class="form-label fw-semibold text-dark">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Masukkan username untuk login" required>
                    </div>
                    
                    <div class="col-12">
                        <label for="password" class="form-label fw-semibold text-dark">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Masukkan password" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="nama_depan" class="form-label fw-semibold text-dark">Nama Depan</label>
                        <input type="text" class="form-control" id="nama_depan" name="nama_depan" placeholder="Nama Depan" required>
                    </div>
                    
                    <div class="col-md-6">
                        <label for="nama_belakang" class="form-label fw-semibold text-dark">Nama Belakang</label>
                        <input type="text" class="form-control" id="nama_belakang" name="nama_belakang" placeholder="Nama Belakang">
                    </div>
                    
                    <div class="col-12">
                        <label for="email" class="form-label fw-semibold text-dark">Email</label>
                        <input type="email" class="form-control" id="email" name="email" placeholder="contoh@domain.com" required>
                    </div>

                    <div class="col-12">
                        <label for="bidang" class="form-label fw-semibold text-dark">Bidang Penempatan</label>
                        <select name="bidang" id="bidang" class="form-select" required>
                            <option value="" disabled selected>-- Pilih Bidang Penempatan --</option>
                            {% for val, label in bidang_choices %}
                                <option value="{{ val }}">{{ label }}</option>
                            {% endfor %}
                        </select>
                        <small class="text-muted">Mentor akan bertanggung jawab pada bidang ini.</small>
                    </div>
                </div>

                <hr class="my-4">

                <div class="d-flex justify-content-end gap-2">
                    <a href="{% url 'users:mentor_list' %}" class="btn btn-light rounded-pill px-4">Batal</a>
                    <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
                        <i class="fas fa-save me-2"></i> Simpan Mentor
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
